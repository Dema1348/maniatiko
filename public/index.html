<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Maniatiko — Hypnotic Industrial Techno</title>
    <meta
      name="description"
      content="Maniatiko — hypnotic industrial techno producer and DJ from Santiago, Chile."
    />
    <meta name="theme-color" content="#050505" />
    <link rel="canonical" href="https://maniatiko-dj.web.app/" />

    <!-- Open Graph -->
    <meta
      property="og:title"
      content="Maniatiko — Hypnotic Industrial Techno"
    />
    <meta
      property="og:description"
      content="Hypnotic industrial techno producer and DJ from Santiago, Chile."
    />
    <meta
      property="og:image"
      content="https://maniatiko-dj.web.app/img/og-image.jpg"
    />
    <meta property="og:url" content="https://maniatiko-dj.web.app/" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:site_name" content="Maniatiko" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Maniatiko — Hypnotic Industrial Techno"
    />
    <meta
      name="twitter:description"
      content="Hypnotic industrial techno producer and DJ from Santiago, Chile."
    />
    <meta
      name="twitter:image"
      content="https://maniatiko-dj.web.app/img/og-image.jpg"
    />

    <link rel="icon" href="favicon.svg" type="image/svg+xml" />

    <!-- Fonts (placeholder, redefinir cuando se cierre la identidad visual) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Elms+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <!-- Loader cinemático corto — counter 150→170 BPM, una sola vez por sesión -->
    <div class="boot-loader" id="bootLoader" aria-hidden="true">
      <div class="boot-loader-inner">
        <div class="boot-loader-brand">Maniatiko</div>
        <div class="boot-loader-meter">
          <span class="boot-loader-num" id="bootLoaderNum">140</span>
          <span class="boot-loader-unit">BPM</span>
        </div>
        <div class="boot-loader-bar">
          <div class="boot-loader-fill" id="bootLoaderFill"></div>
        </div>
        <div class="boot-loader-stamp">† Tuning the ritual</div>
      </div>
    </div>

    <!-- Custom cursor (desktop only) -->
    <div class="cursor" id="cursorRoot" aria-hidden="true">
      <div class="cursor-dot"></div>
      <div class="cursor-ring"></div>
    </div>

    <!-- Atmospheric overlays -->
    <canvas class="tv-static" id="tvStatic" aria-hidden="true"></canvas>
    <div class="grain-overlay" aria-hidden="true"></div>
    <div class="scanlines" aria-hidden="true"></div>
    <div class="bochka-pulse" aria-hidden="true"></div>

    <!-- Nav (renderizado por JS desde data.nav) -->
    <nav class="nav" id="nav">
      <a href="#hero" class="nav-logo" id="navLogo">Maniatiko</a>
      <button class="nav-toggle" id="navToggle" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <div class="nav-links" id="navLinks"></div>
    </nav>

    <!-- Hero — Ritual Engine minimal: shader + ghosts + nombre + engage -->
    <section id="hero" class="hero">
      <canvas class="hero-shader" id="heroShader" aria-hidden="true"></canvas>
      <div class="hero-veil" aria-hidden="true"></div>
      <div class="hero-ghosts" id="heroGhosts" aria-hidden="true"></div>
      <div class="hero-bpm" id="heroBpm">170 BPM</div>

      <div class="hero-core">
        <h1 class="hero-title" id="heroTitle">Maniatiko</h1>
        <span class="hero-role" id="heroRole"></span>
        <button class="hero-engage" id="heroEngage" type="button">
          <span class="hero-engage-rule hero-engage-rule--top" aria-hidden="true"></span>
          <span class="hero-engage-label" id="heroEngageLabel">Engage ritual</span>
          <span class="hero-engage-rule hero-engage-rule--bottom" aria-hidden="true"></span>
        </button>
      </div>

      <div class="scroll-hint" aria-hidden="true">
        <div class="scroll-line"></div>
      </div>
    </section>

    <!-- Secciones dinámicas (renderizadas por JS desde data.sections) -->
    <main id="sectionsRoot"></main>

    <!-- Lightbox (galería) -->
    <div class="lightbox" id="lightbox" aria-hidden="true">
      <button class="lightbox-close" id="lightboxClose" aria-label="Cerrar">
        &times;
      </button>
      <div class="lightbox-content" id="lightboxContent"></div>
    </div>

    <!-- Sticky mini-player (aparece al reproducir un track) -->
    <aside class="mini-player" id="miniPlayer" aria-hidden="true">
      <button
        class="mini-player-toggle"
        id="miniPlayerToggle"
        aria-label="Play/Pause"
      >
        <svg
          class="mp-icon mp-icon--play"
          viewBox="0 0 24 24"
          fill="currentColor"
          aria-hidden="true"
        >
          <path d="M6 4l14 8-14 8z" />
        </svg>
        <svg
          class="mp-icon mp-icon--pause"
          viewBox="0 0 24 24"
          fill="currentColor"
          aria-hidden="true"
        >
          <path d="M6 4h4v16H6zM14 4h4v16h-4z" />
        </svg>
      </button>
      <div class="mini-player-meta">
        <span class="mini-player-label">† Now playing</span>
        <span class="mini-player-title" id="miniPlayerTitle">—</span>
      </div>
      <div class="mini-player-scrub">
        <div class="mini-player-bar">
          <div class="mini-player-progress" id="miniPlayerProgress"></div>
        </div>
        <span class="mini-player-time" id="miniPlayerTime">0:00</span>
      </div>
      <button class="mini-player-close" id="miniPlayerClose" aria-label="Stop">
        ✕
      </button>
      <iframe
        id="scWidget"
        allow="autoplay"
        frameborder="0"
        scrolling="no"
        title="SoundCloud player"
        tabindex="-1"
      ></iframe>
    </aside>

    <!-- Footer (renderizado por JS) -->
    <footer class="footer">
      <div class="footer-inner">
        <div class="footer-brand" id="footerBrand">Maniatiko</div>
        <p class="footer-epitaph" id="footerEpitaph"></p>
        <div class="footer-booking" id="footerBooking"></div>
        <div class="footer-links" id="footerLinks"></div>
        <div class="footer-bottom">
          <p>
            &copy; <span id="year"></span>
            <span id="footerName">Maniatiko</span>.
          </p>
          <p class="footer-credit" id="footerCredit"></p>
        </div>
      </div>
    </footer>

    <!-- GSAP + ScrollTrigger -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/ScrollTrigger.min.js"></script>

    <!-- Lenis smooth scroll -->
    <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.20/dist/lenis.min.js"></script>

    <!-- Three.js — hero shader WebGL (5 layers) -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

    <!-- Tone.js — kick sintético 170 BPM (opt-in via Engage button) -->
    <script src="https://cdn.jsdelivr.net/npm/tone@14.8.49/build/Tone.js"></script>

    <!-- SoundCloud Widget API (mini-player) -->
    <script src="https://w.soundcloud.com/player/api.js"></script>

    <script src="js/main.js"></script>
  </body>
</html>
