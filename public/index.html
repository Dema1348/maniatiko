          <h2>About</h2>
          <p>Maniatiko is a Producer and DJ born in Santiago, Chile, focused on developing his own vision within industrial techno. His work emerges from a deeply personal quest, shaping a new sonic language: a collision between Bochka pressure, hypnotic grooves, tectonic energy and a constant, dark, immersive and destructive propulsion in its impact.</p>
          <p>Within the Chilean underground scene he has become a recurring figure, sharing stages with Aldes, Kask4r, 19.85, Mary B, Likikon, Bonek and Lurtz. Operating in the 150–170 BPM range. Sound: Techno, Neo Bochka, Hypnotic. Base: Lo Prado, Santiago.</p>
