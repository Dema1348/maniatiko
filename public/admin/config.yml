backend:
  name: git-gateway
  branch: main

# Archivos de imagen subidos desde el CMS van a public/img/
media_folder: "public/img"
public_folder: "/img"

# URLs visibles en el dashboard del CMS
site_url: https://maniatiko.cl
display_url: https://maniatiko.cl
logo_url: https://maniatiko.cl/img/og-share.jpg

# Desactivar el "View Preview" del editor toolbar — con Git Gateway no hay
# deploy preview real, y Decap CMS tira TypeError en loadDeployPreview cuando
# intenta llamar backend.getDeploy() porque devuelve undefined.
show_preview_links: false

# Modo de publicación: simple = cambios pasan directo a main (más rápido)
# editorial_workflow sería con drafts/review, requiere más setup
publish_mode: simple

# Mensaje custom para los commits que genera el CMS
commit_messages:
  create: "CMS: agregar {{collection}} `{{slug}}`"
  update: "CMS: actualizar {{collection}} `{{slug}}`"
  delete: "CMS: eliminar {{collection}} `{{slug}}`"
  uploadMedia: "CMS: subir media `{{path}}`"
  deleteMedia: "CMS: borrar media `{{path}}`"

# ============================================================
# i18n — campos bilingües ES + EN
# ============================================================
# Cada string traducible es un object {es, en}. En el CMS se muestran
# como un widget "object" con dos sub-inputs (Español + English) lado a lado.
# Los strings que NO se traducen (nombres propios, fechas, URLs, etc.)
# quedan como widget: string normal.
#
# Para agregar un field traducible nuevo, usá este patrón:
#   - label: "Mi field"
#     name: "myField"
#     widget: "object"
#     fields:
#       - { label: "Español", name: "es", widget: "string" }
#       - { label: "English", name: "en", widget: "string" }
# (cambiá widget a "text" para campos multi-línea)
# ============================================================

collections:
  - name: site
    label: "Sitio"
    description: "Información general del sitio: nombre, descripción, hero, footer, redes sociales."
    files:
      - file: "public/data.json"
        name: "site_general"
        label: "Configuración general del sitio"
        fields:
          - label: "Site"
            name: "site"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Nombre del artista", name: "name", widget: "string", hint: "No se traduce — es el nombre propio" }
              - label: "Tagline corta (bilingüe)"
                name: "tagline"
                widget: "object"
                hint: "Frase corta que sale como subtítulo del título principal en Google y redes"
                fields:
                  - { label: "Español", name: "es", widget: "string" }
                  - { label: "English", name: "en", widget: "string" }
              - label: "Descripción (meta — bilingüe)"
                name: "description"
                widget: "object"
                hint: "Aparece en Google y en preview cards al compartir. ~160 caracteres"
                fields:
                  - { label: "Español", name: "es", widget: "text" }
                  - { label: "English", name: "en", widget: "text" }
              - { label: "URL del sitio", name: "url", widget: "string", default: "https://maniatiko.cl/" }
              - { label: "OG image (preview en redes)", name: "ogImage", widget: "string", default: "img/og-share.jpg", hint: "Path relativo. La imagen ideal es 1200×630px" }
              - { label: "Theme color", name: "themeColor", widget: "string", default: "#050505" }

          - label: "Hero (header del sitio)"
            name: "hero"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Título principal", name: "title", widget: "string", default: "Maniatiko", hint: "Nombre del artista, no se traduce" }
              - label: "Rol / sub-línea (bilingüe)"
                name: "role"
                widget: "object"
                fields:
                  - { label: "Español", name: "es", widget: "string", default: "Productor & DJ" }
                  - { label: "English", name: "en", widget: "string", default: "Producer & DJ" }
              - { label: "BPM (número)", name: "bpm", widget: "number", value_type: "int", min: 1, max: 999, default: 170 }
              - label: "Botón Engage (bilingüe)"
                name: "engage"
                widget: "object"
                fields:
                  - label: "Texto cuando está apagado"
                    name: "labelOff"
                    widget: "object"
                    fields:
                      - { label: "Español", name: "es", widget: "string", default: "Iniciar ritual" }
                      - { label: "English", name: "en", widget: "string", default: "Engage ritual" }
                  - label: "Texto cuando está activo"
                    name: "labelOn"
                    widget: "object"
                    fields:
                      - { label: "Español", name: "es", widget: "string", default: "Detener" }
                      - { label: "English", name: "en", widget: "string", default: "Disengage" }

          - label: "Marquee — palabras del mantra"
            name: "marquee"
            widget: "list"
            collapsed: false
            summary: "{{lane}}"
            hint: "Las palabras que cruzan horizontalmente entre el hero y Origin. Funcionan como tags universales — NO se traducen (igual en ambos idiomas). Recomendado 2 palabras."
            fields:
              - { label: "Palabra (mantra)", name: "lane", widget: "string" }

          - label: "Origin — bio + dossier"
            name: "bio"
            widget: "object"
            collapsed: false
            hint: "La primera sección de la página: 3 párrafos de bio + tabla de datos del artista (Origin, Base, Sound, BPM, etc)."
            fields:
              - label: "Bio (3 párrafos numerados I/II/III, bilingüe c/u)"
                name: "chapters"
                widget: "list"
                hint: "Cada párrafo tiene su versión ES y EN. Se renderiza numerado I/II/III en orden. Podés usar **negrita** y *cursiva* (botones B / I del editor)."
                fields:
                  - label: "Párrafo"
                    name: "item"
                    widget: "object"
                    fields:
                      - { label: "Español", name: "es", widget: "markdown", buttons: ["bold", "italic"], editor_components: [], minimal: true }
                      - { label: "English", name: "en", widget: "markdown", buttons: ["bold", "italic"], editor_components: [], minimal: true }
              - label: "Dossier (tabla key/value)"
                name: "dossier"
                widget: "object"
                collapsed: false
                fields:
                  - label: "Título del dossier (bilingüe)"
                    name: "title"
                    widget: "object"
                    fields:
                      - { label: "Español", name: "es", widget: "string", default: "† Dossier del artista" }
                      - { label: "English", name: "en", widget: "string", default: "† Artist Dossier" }
                  - label: "Filas"
                    name: "rows"
                    widget: "list"
                    summary: "{{key.es}} → {{value}}"
                    fields:
                      - label: "Clave (bilingüe — ej. Origen/Origin)"
                        name: "key"
                        widget: "object"
                        fields:
                          - { label: "Español", name: "es", widget: "string" }
                          - { label: "English", name: "en", widget: "string" }
                      - { label: "Valor (no se traduce — datos)", name: "value", widget: "string" }

          - label: "Booking — bloque de contacto al final"
            name: "booking"
            widget: "object"
            collapsed: false
            hint: "Datos del bloque destacado de Booking — el mailto se arma automáticamente con email + subject."
            fields:
              - label: "Intro (bilingüe — frase corta arriba)"
                name: "intro"
                widget: "object"
                required: false
                fields:
                  # Sub-fields opcionales porque el parent también lo es (sino
                  # validan PRESENCE aunque el object esté vacío como esperamos)
                  - { label: "Español", name: "es", widget: "string", required: false }
                  - { label: "English", name: "en", widget: "string", required: false }
              - { label: "Email destino", name: "email", widget: "string" }
              - label: "Label del email (bilingüe)"
                name: "emailLabel"
                widget: "object"
                fields:
                  - { label: "Español", name: "es", widget: "string", default: "† Booking directo" }
                  - { label: "English", name: "en", widget: "string", default: "† Direct booking" }
              - label: "Subject del email (bilingüe — asunto)"
                name: "emailSubject"
                widget: "object"
                fields:
                  - { label: "Español", name: "es", widget: "string", default: "[BOOKING] Evento · Fecha · Ciudad" }
                  - { label: "English", name: "en", widget: "string", default: "[BOOKING] Event · Date · City" }
              - label: "Brief — checklist que el promotor debe incluir (bilingüe c/item)"
                name: "brief"
                widget: "list"
                fields:
                  - label: "Item"
                    name: "item"
                    widget: "object"
                    fields:
                      - { label: "Español", name: "es", widget: "string" }
                      - { label: "English", name: "en", widget: "string" }
              - label: "Alt — link a DM Instagram"
                name: "alt"
                widget: "object"
                required: false
                fields:
                  - label: "Label (bilingüe — ej. O DM / Or DM)"
                    name: "label"
                    widget: "object"
                    required: false
                    fields:
                      # Parent (alt) es required: false → sub-fields también
                      - { label: "Español", name: "es", widget: "string", default: "O DM", required: false }
                      - { label: "English", name: "en", widget: "string", default: "Or DM", required: false }
                  - { label: "Handle (ej. @maniatiko.dj)", name: "handle", widget: "string" }
                  - { label: "URL completa", name: "url", widget: "string" }

          - label: "Redes sociales (orden = orden en footer)"
            name: "socials"
            widget: "list"
            collapsed: false
            summary: "{{label}}"
            hint: "Las labels son nombres de plataforma — no se traducen"
            fields:
              - { label: "Plataforma", name: "label", widget: "string", hint: "Bandcamp, Spotify, SoundCloud, YouTube, Instagram, TikTok, Facebook…" }
              - { label: "URL", name: "url", widget: "string" }

          - label: "Footer"
            name: "footer"
            widget: "object"
            collapsed: true
            fields:
              - label: "Epitafio (bilingüe — frase final)"
                name: "epitaph"
                widget: "object"
                required: false
                fields:
                  # Parent es required: false → sub-fields también
                  - { label: "Español", name: "es", widget: "string", required: false }
                  - { label: "English", name: "en", widget: "string", required: false }
              - label: "Credit"
                name: "credit"
                widget: "object"
                required: false
                fields:
                  - { label: "Texto del crédito (handle, no se traduce)", name: "label", widget: "string" }
                  - { label: "Link del crédito (URL)", name: "href", widget: "string" }
                  - label: "Prefijo (bilingüe — ej. Hecho con amor por / Made with love by)"
                    name: "prefix"
                    widget: "object"
                    required: false
                    fields:
                      # Parent credit es required: false → sub-fields también
                      - { label: "Español", name: "es", widget: "string", required: false }
                      - { label: "English", name: "en", widget: "string", required: false }

          # Campos avanzados (escondidos por default — no tocar a menos que sepas)
          - label: "Nav (avanzado, vacío = auto)"
            name: "nav"
            widget: "list"
            required: false
            collapsed: true
            hint: "Dejá vacío para que el menú se genere automáticamente desde las secciones"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Href", name: "href", widget: "string" }

          - label: "Analytics Firebase (NO TOCAR — generado automáticamente)"
            name: "analytics"
            widget: "object"
            collapsed: true
            required: false
            fields:
              - { label: "Activo", name: "enabled", widget: "boolean", default: true }
              - label: "Config"
                name: "firebase"
                widget: "object"
                fields:
                  - { label: "API Key", name: "apiKey", widget: "string", required: false }
                  - { label: "Auth Domain", name: "authDomain", widget: "string", required: false }
                  - { label: "Project ID", name: "projectId", widget: "string", required: false }
                  - { label: "Storage Bucket", name: "storageBucket", widget: "string", required: false }
                  - { label: "Messaging Sender ID", name: "messagingSenderId", widget: "string", required: false }
                  - { label: "App ID", name: "appId", widget: "string", required: false }
                  - { label: "Measurement ID", name: "measurementId", widget: "string", required: false }

          - label: "Secciones (avanzado — orden y tipos de bloques del sitio)"
            name: "sections"
            widget: "list"
            collapsed: true
            hint: "No tocar a menos que sepas lo que hacés. Solo controla el orden, el tipo y los títulos de cada bloque — el CONTENIDO real de cada uno se edita en su field propio arriba (Marquee, Origin, Tracks, Gigs, etc.). Title y subtitle son bilingües."
            summary: "{{id}} — {{type}}"
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "Tipo", name: "type", widget: "string", hint: "marquee | chapters | gigs | mixes | memories | press | featured | presskit | booking-card" }
              - label: "Título (bilingüe)"
                name: "title"
                widget: "object"
                required: false
                fields:
                  # Parent es required: false (el marquee no tiene title) →
                  # sub-fields también para no disparar PRESENCE en items vacíos
                  - { label: "Español", name: "es", widget: "string", required: false }
                  - { label: "English", name: "en", widget: "string", required: false }
              - label: "Subtítulo (bilingüe)"
                name: "subtitle"
                widget: "object"
                required: false
                fields:
                  - { label: "Español", name: "es", widget: "string", required: false }
                  - { label: "English", name: "en", widget: "string", required: false }
              - { label: "Source (nombre del bloque en data.json)", name: "source", widget: "string", required: false }

          # === Colecciones top-level del data.json ===
          - label: "Gigs (fechas en vivo)"
            name: "gigs"
            widget: "list"
            collapsed: false
            summary: "{{date}} — {{venue}}"
            hint: "Fechas, venues y ciudades son datos — no se traducen"
            fields:
              - { label: "Fecha", name: "date", widget: "string", hint: "Formato US: MM.DD.AAAA — ej. 06.20.2026", pattern: ['^[0-9]{2}\.[0-9]{2}\.[0-9]{4}$', 'Formato esperado: MM.DD.AAAA'] }
              - { label: "Ciudad", name: "city", widget: "string", default: "Santiago, CL" }
              - { label: "Venue", name: "venue", widget: "string" }
              - { label: "Lineup", name: "lineup", widget: "list", field: { label: "Nombre", name: "name", widget: "string" }, required: false }
              - { label: "Link de tickets", name: "tickets", widget: "string", required: false }

          - label: "Tracks (Productions / SoundCloud)"
            name: "mixes"
            widget: "list"
            collapsed: false
            summary: "{{title}}"
            hint: "Los títulos de los tracks son nombres propios — NO se traducen. Solo la descripción es bilingüe."
            fields:
              - { label: "Plataforma", name: "platform", widget: "string", default: "SoundCloud · Original" }
              - { label: "Título (no traducir)", name: "title", widget: "string" }
              - label: "Descripción corta (bilingüe — soporta **negrita** / *cursiva*)"
                name: "description"
                widget: "object"
                fields:
                  - { label: "Español", name: "es", widget: "markdown", buttons: ["bold", "italic"], editor_components: [], minimal: true }
                  - { label: "English", name: "en", widget: "markdown", buttons: ["bold", "italic"], editor_components: [], minimal: true }
              - { label: "URL del track en SoundCloud", name: "url", widget: "string" }

          - label: "Memorias (Aftermath — set + foto + anécdota)"
            name: "memories"
            widget: "list"
            collapsed: false
            summary: "{{venue}}"
            fields:
              - { label: "Fecha", name: "date", widget: "string", required: false, default: "—" }
              - { label: "Venue (no traducir)", name: "venue", widget: "string" }
              - { label: "Ciudad", name: "city", widget: "string" }
              - label: "Anécdota (bilingüe — soporta **negrita** / *cursiva*)"
                name: "anecdote"
                widget: "object"
                fields:
                  - { label: "Español", name: "es", widget: "markdown", buttons: ["bold", "italic"], editor_components: [], minimal: true }
                  - { label: "English", name: "en", widget: "markdown", buttons: ["bold", "italic"], editor_components: [], minimal: true }
              - { label: "Foto", name: "image", widget: "image", required: false }

          - label: "Press (Reverb — quotes)"
            name: "press"
            widget: "list"
            collapsed: false
            summary: "{{source}}"
            fields:
              - label: "Quote (bilingüe — soporta **negrita** / *cursiva*)"
                name: "quote"
                widget: "object"
                fields:
                  - { label: "Español", name: "es", widget: "markdown", buttons: ["bold", "italic"], editor_components: [], minimal: true }
                  - { label: "English", name: "en", widget: "markdown", buttons: ["bold", "italic"], editor_components: [], minimal: true }
              - { label: "Fuente (atribución — no traducir)", name: "source", widget: "string" }

          - label: "Hosted by (venues/crews que lo hostearon)"
            name: "featured"
            widget: "list"
            collapsed: false
            summary: "{{name}}"
            hint: "Nombres propios de crews/venues — no se traducen"
            fields:
              - { label: "Nombre", name: "name", widget: "string" }
              - { label: "Link (opcional)", name: "link", widget: "string", required: false }

          - label: "Press Kit (cards descargables)"
            name: "presskit"
            widget: "list"
            collapsed: true
            summary: "{{title.es}}"
            fields:
              - label: "Tipo (bilingüe)"
                name: "kind"
                widget: "object"
                hint: "Ej. Recursos de marca / Brand Assets, Documento de texto / Text Document, etc."
                fields:
                  - { label: "Español", name: "es", widget: "string" }
                  - { label: "English", name: "en", widget: "string" }
              - label: "Título (bilingüe)"
                name: "title"
                widget: "object"
                fields:
                  - { label: "Español", name: "es", widget: "string" }
                  - { label: "English", name: "en", widget: "string" }
              - label: "Descripción (bilingüe — soporta **negrita** / *cursiva*)"
                name: "description"
                widget: "object"
                fields:
                  - { label: "Español", name: "es", widget: "markdown", buttons: ["bold", "italic"], editor_components: [], minimal: true }
                  - { label: "English", name: "en", widget: "markdown", buttons: ["bold", "italic"], editor_components: [], minimal: true }
              - label: "Texto del CTA (bilingüe)"
                name: "cta"
                widget: "object"
                fields:
                  - { label: "Español", name: "es", widget: "string" }
                  - { label: "English", name: "en", widget: "string" }
              - { label: "URL de descarga", name: "url", widget: "string", default: "#" }
