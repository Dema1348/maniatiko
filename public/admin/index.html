<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maniatiko · Content Manager</title>
    <meta name="robots" content="noindex, nofollow" />

    <!-- Netlify Identity (autenticación) -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

    <!-- ============================================================
         Diagnostic logs — solo activos en /admin/ (no en el sitio real).
         Capturan unhandled promise rejections (los errores "Uncaught
         (in promise) undefined" de Decap CMS) y wrappean fetch para
         mostrar requests al Git Gateway con status + body de la response.
         Toggle con localStorage.cms_debug = "off" si molesta.
         ============================================================ -->
    <script>
      (function () {
        if (localStorage.cms_debug === "off") return;
        var TAG = "[cms-debug]";
        var c = console;

        // 1. Capturar TODAS las promise rejections no manejadas.
        // Decap a veces hace `Promise.reject(undefined)` y se pierde el
        // contexto del error. Acá lo expandimos.
        window.addEventListener("unhandledrejection", function (event) {
          var reason = event.reason;
          c.group(TAG + " ⚠️ Unhandled promise rejection");
          c.log("reason:", reason);
          if (reason && typeof reason === "object") {
            c.log("  type:", reason.constructor && reason.constructor.name);
            c.log("  message:", reason.message);
            c.log("  status:", reason.status);
            c.log("  statusText:", reason.statusText);
            c.log("  response:", reason.response);
            if (reason.stack) c.log("  stack:", reason.stack);
            try { c.log("  json:", JSON.stringify(reason, Object.getOwnPropertyNames(reason))); } catch (e) {}
          } else if (reason === undefined) {
            c.warn("  rejection con reason=undefined (típico cuando un backend devuelve respuesta sin body)");
          }
          c.log("  event:", event);
          c.groupEnd();
        });

        // 2. Capturar errores globales (sintaxis, runtime, etc.)
        window.addEventListener("error", function (event) {
          c.group(TAG + " ❌ Window error");
          c.log("message:", event.message);
          c.log("source:", event.filename + ":" + event.lineno + ":" + event.colno);
          c.log("error:", event.error);
          c.groupEnd();
        });

        // 3. Wrappear fetch para loggear requests al Git Gateway, Netlify
        // Identity y GitHub. Útil para ver auth + status del commit.
        var origFetch = window.fetch;
        window.fetch = function (input, init) {
          var url = typeof input === "string" ? input : (input && input.url) || "";
          var isInteresting =
            url.indexOf("/.netlify/") >= 0 ||
            url.indexOf("git-gateway") >= 0 ||
            url.indexOf("api.github.com") >= 0 ||
            url.indexOf("identity") >= 0;
          if (!isInteresting) return origFetch.apply(this, arguments);

          var method = (init && init.method) || "GET";
          var reqId = Math.random().toString(36).slice(2, 7);
          c.log(TAG + " → " + method + " " + url + " [" + reqId + "]");

          return origFetch.apply(this, arguments).then(
            function (res) {
              var status = res.status;
              var icon = status >= 200 && status < 300 ? "✓" : "✗";
              c.log(TAG + " " + icon + " " + status + " " + url + " [" + reqId + "]");
              if (status >= 400) {
                // Clonar para no consumir el body original
                res.clone().text().then(function (body) {
                  c.group(TAG + " ⚠️ Error response [" + reqId + "]");
                  c.log("status:", status, res.statusText);
                  c.log("body:", body);
                  c.groupEnd();
                }).catch(function () {});
              }
              return res;
            },
            function (err) {
              c.error(TAG + " ✗ network error " + url + " [" + reqId + "]", err);
              throw err;
            }
          );
        };

        // 4. Wrappear Promise.reject para capturar stack trace de rejects vacíos.
        // Decap CMS hace Promise.reject(undefined) en varios lugares — esto nos
        // dice EXACTAMENTE quién lo llamó. PLUS: escanea el DOM por fields
        // marcados como inválidos para identificar qué validación falló.
        var origReject = Promise.reject.bind(Promise);
        Promise.reject = function (reason) {
          if (reason === undefined || reason === null) {
            c.group(TAG + " 🎯 Promise.reject(empty) caller stack");
            var stack = new Error("reject was called here").stack || "";
            c.log(stack);
            // Si viene de persistEntry, leer el store de Redux para mostrar
            // exactamente qué fieldsErrors disparó el reject.
            if (stack.indexOf("handlePersistEntry") >= 0 || stack.indexOf("persistEntry") >= 0) {
              c.warn(TAG + " ⚠️ Validation rechazó persistEntry. Leyendo Redux store...");
              try {
                if (typeof window.cmsInspect === "function") window.cmsInspect();
              } catch (e) {
                c.warn(TAG + " cmsInspect falló:", e);
              }
              c.warn(TAG + " ⚠️ Escaneando DOM por errores...");
              try {
                var invalidEls = document.querySelectorAll(
                  '[aria-invalid="true"], [class*="error"], [class*="Error"], [data-testid*="error"]'
                );
                if (invalidEls.length === 0) {
                  c.log(TAG + " (no DOM marcado con aria-invalid o class error)");
                }
                invalidEls.forEach(function (el, i) {
                  if (i > 20) return;
                  // Buscar el label más cercano para identificar el field
                  var ctx = el;
                  for (var depth = 0; depth < 8 && ctx; depth++) {
                    var label = ctx.querySelector && (ctx.querySelector("label") || ctx.querySelector("[class*='label' i]"));
                    if (label && label.textContent) {
                      c.log(TAG + " ⚠️ field con error → label='" + label.textContent.trim().slice(0, 80) + "', el=", el);
                      return;
                    }
                    ctx = ctx.parentElement;
                  }
                  c.log(TAG + " ⚠️ field con error (sin label cercano):", el);
                });
                // También buscar los notification toasts que Decap mostró
                var toasts = document.querySelectorAll("[class*='Notification'], [class*='Toast'], [role='alert']");
                toasts.forEach(function (t) {
                  if (t.textContent && t.textContent.trim()) {
                    c.log(TAG + " 🔔 Toast/Notification:", t.textContent.trim());
                  }
                });
              } catch (e) {
                c.log(TAG + " error escaneando DOM:", e);
              }
            }
            c.groupEnd();
          }
          return origReject(reason);
        };

        // 5. Capturar errors en JSON.parse — si Decap intenta parsear un
        // blob binario (imagen) como JSON, falla.
        var origParse = JSON.parse;
        JSON.parse = function (text, reviver) {
          try {
            return origParse(text, reviver);
          } catch (e) {
            // Truncamos input por si es grande
            var preview = typeof text === "string" ? text.slice(0, 80) : String(text).slice(0, 80);
            c.warn(TAG + " ⚠️ JSON.parse failed on input:", preview, "→ err:", e.message);
            throw e;
          }
        };

        // 6. Acceso al store de Redux de Decap CMS via React fiber.
        // Permite leer el state.entryDraft.fieldsErrors directamente para
        // identificar exactamente qué validación falló.
        function findReduxStore() {
          // Probar múltiples candidatos de root
          var roots = [
            document.getElementById("nc-root"),
            document.querySelector("[data-reactroot]"),
            document.body && document.body.firstElementChild,
            document.body,
          ].filter(Boolean);
          for (var i = 0; i < roots.length; i++) {
            var el = roots[i];
            // React 18+ guarda el container en __reactContainer$xxx
            var keys = Object.keys(el).concat(Object.keys(el.__proto__ || {}));
            for (var k = 0; k < keys.length; k++) {
              var key = keys[k];
              if (key.indexOf("__reactContainer$") === 0 || key === "_reactRootContainer") {
                var container = el[key];
                var fiber = container && (container.stateNode ? container.stateNode.current : container.current);
                if (!fiber && container && container._internalRoot) fiber = container._internalRoot.current;
                if (!fiber) fiber = container;
                // Walk hasta encontrar el Provider
                var found = walkFiber(fiber, 25);
                if (found) return found;
              }
            }
          }
          return null;
        }
        function walkFiber(node, maxDepth) {
          if (!node || maxDepth <= 0) return null;
          // El Provider de react-redux guarda el store en memoizedProps.value.store
          // o en memoizedProps.store dependiendo de la versión.
          var props = node.memoizedProps || node.pendingProps;
          if (props) {
            if (props.store && typeof props.store.getState === "function") return props.store;
            if (props.value && props.value.store && typeof props.value.store.getState === "function") return props.value.store;
          }
          return walkFiber(node.child, maxDepth - 1) || walkFiber(node.sibling, maxDepth - 1);
        }

        // Función expuesta a window para inspección manual desde DevTools.
        window.cmsInspect = function () {
          var store = findReduxStore();
          if (!store) {
            c.warn(TAG + " no encontré el Redux store de Decap. ¿Estás en /admin/?");
            return null;
          }
          var state = store.getState();
          c.log(TAG + " 🔍 Estado completo del Redux store:");
          var snapshot = {};
          // El state es un Immutable Record/Map — convertir a JS plain
          try {
            var keys = state && state.toJS ? Object.keys(state.toJS()) : Object.keys(state);
            keys.forEach(function (k) {
              try {
                var val = state.get ? state.get(k) : state[k];
                snapshot[k] = val && val.toJS ? val.toJS() : val;
              } catch (e) { snapshot[k] = "(error)"; }
            });
          } catch (e) {
            c.warn("error iterando state:", e);
          }
          c.log("  state keys:", Object.keys(snapshot));

          // Específicamente: fieldsErrors del entryDraft
          if (snapshot.entryDraft) {
            var fe = snapshot.entryDraft.fieldsErrors;
            c.log(TAG + " 🎯 entryDraft.fieldsErrors:", fe);
            if (fe && Object.keys(fe).length > 0) {
              c.warn(TAG + " ⚠️ HAY ERRORES DE VALIDACIÓN:");
              Object.keys(fe).forEach(function (fieldId) {
                c.warn("    field:", fieldId, "→", fe[fieldId]);
              });
            } else {
              c.log(TAG + " fieldsErrors está vacío");
            }
            c.log(TAG + " 🎯 entryDraft.entry:", snapshot.entryDraft.entry);
          }
          return snapshot;
        };

        c.log(TAG + " activo. Funciones: window.cmsInspect() — para desactivar: localStorage.cms_debug = 'off' + recargar");
      })();
    </script>
  </head>
  <body>
    <!-- Decap CMS (formerly Netlify CMS) -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

    <!-- Preview template (live preview pane a la derecha del form) -->
    <script src="preview.js"></script>

    <script>
      // Si el usuario no está logueado, redirige al login.
      // Tras login exitoso, recarga /admin/ para entrar al CMS.
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", (user) => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
  </body>
</html>
